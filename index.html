<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="A premium Tic-Tac-Toe web application with Player vs Player and Player vs AI modes.">
    <title>Tic-Tac-Toe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="background-animation">
        <span></span><span></span><span></span><span></span><span></span>
    </div>

    <main class="container glass-panel">
        <header>
            <h1 class="title">Tic <span class="accent">Tac</span> Toe</h1>
            <p class="subtitle">Experience the classic, reimagined.</p>
        </header>

        <section class="game-controls">
            <div class="mode-selector">
                <button id="mode-pvp" class="btn active">Player vs Player</button>
                <button id="mode-pvai" class="btn">Player vs AI</button>
            </div>

            <div class="status-board">
                <div class="player-score" id="score-x">
                    <span class="label">Player X</span>
                    <span class="score">0</span>
                </div>
                <div class="turn-indicator" id="turn-indicator">
                    X's Turn
                </div>
                <div class="player-score" id="score-o">
                    <span class="label">Player O</span>
                    <span class="score">0</span>
                </div>
            </div>
        </section>

        <section class="game-board" id="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </section>

        <footer class="game-footer">
            <button id="reset-btn" class="btn btn-reset">Restart Game</button>
        </footer>
    </main>

    <div id="modal" class="modal hidden glass-panel">
        <div class="modal-content">
            <h2 id="modal-message">Player X Wins!</h2>
            <button id="modal-close" class="btn btn-primary">Play Again</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
